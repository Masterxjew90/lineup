<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lineup Level Overlay</title>
<style>
  :root{ --accent:#FF5C39; --text:#fff; }
  *{margin:0; padding:0; box-sizing:border-box}
  html,body{background:transparent !important; overflow:hidden; font-family:'Segoe UI',system-ui,sans-serif}
  #wrap{position:fixed; left:20px; bottom:20px; width:340px}
  .card{
    background:linear-gradient(135deg, rgba(20,21,30,.94), rgba(28,22,38,.94));
    border:1px solid rgba(255,255,255,.12);
    border-radius:16px; padding:15px 18px; color:var(--text);
    box-shadow:0 12px 40px rgba(0,0,0,.5); backdrop-filter:blur(6px);
    opacity:0; transform:translateY(14px); transition:opacity .5s ease, transform .5s ease;
  }
  .card.show{opacity:1; transform:translateY(0)}
  .top{display:flex; align-items:center; gap:11px}
  .badge{
    font-family:'JetBrains Mono',ui-monospace,monospace; font-weight:800; font-size:15px;
    padding:6px 11px; border-radius:9px; border:2px solid; line-height:1; white-space:nowrap;
  }
  .who{min-width:0}
  .name{font-weight:800; font-size:15px; letter-spacing:-.01em; overflow:hidden; text-overflow:ellipsis; white-space:nowrap}
  .sub{font-size:11.5px; color:rgba(255,255,255,.6); margin-top:1px}
  .bar{height:9px; background:rgba(255,255,255,.1); border-radius:99px; overflow:hidden; margin-top:12px}
  .fill{height:100%; border-radius:99px; width:0; transition:width .8s ease}
  .foot{display:flex; justify-content:space-between; margin-top:7px; font-size:11px; color:rgba(255,255,255,.55)}
  .brand{margin-top:11px; padding-top:9px; border-top:1px solid rgba(255,255,255,.1); font-size:10.5px; color:rgba(255,255,255,.5)}
  .brand b{color:#fff; font-weight:800}
  .brand b span{color:var(--accent)}
</style>
</head>
<body>
<div id="wrap">
  <div class="card" id="card">
    <div class="top">
      <span class="badge" id="badge">LVL 1</span>
      <div class="who">
        <div class="name" id="name">—</div>
        <div class="sub" id="sub">Community supporter rank</div>
      </div>
    </div>
    <div class="bar"><div class="fill" id="fill"></div></div>
    <div class="foot"><span id="cur"></span><span id="next"></span></div>
    <div class="brand">Level up by supporting small streamers on <b>Line<span>up</span></b></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  const SUPABASE_URL = 'https://pxitnueanibluylurfif.supabase.co';
  const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InB4aXRudWVhbmlibHV5bHVyZmlmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI0NTk3OTEsImV4cCI6MjA5ODAzNTc5MX0.M_fzzLm7nFACelBHM_BD1KXGa5yj9JAVECM3VNLSwng';
  const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

  const params = new URLSearchParams(location.search);
  const username = (params.get('u') || '').trim().toLowerCase();

  const card = document.getElementById('card');

  function levelInfo(total){
    total = Math.max(0, total || 0);
    const lvl = Math.floor((1 + Math.sqrt(1 + 0.08 * total)) / 2);
    const curFloor = 100 * lvl * (lvl - 1) / 2;
    const nextFloor = 100 * lvl * (lvl + 1) / 2;
    const span = nextFloor - curFloor, into = total - curFloor;
    return { level: lvl, into, span, pct: span > 0 ? Math.min(100, Math.round(into / span * 100)) : 100, toNext: Math.max(0, nextFloor - total) };
  }
  function levelColor(lvl){
    const stops = ['#7C8696','#3DDC97','#36B6FF','#A56BFF','#FF5C39','#FFB23D'];
    return stops[Math.min(stops.length - 1, Math.floor((lvl - 1) / 3))];
  }
  function escapeHtml(s){ return String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

  async function tick(){
    if(!username){ document.getElementById('name').textContent = 'Add ?u=yourusername'; card.classList.add('show'); return; }
    try{
      const { data, error } = await sb.from('profiles')
        .select('display_name, username, total_earned').ilike('username', username).limit(1);
      if(error || !data || !data.length){ card.classList.remove('show'); return; }
      const p = data[0];
      const li = levelInfo(p.total_earned || 0);
      const c = levelColor(li.level);
      const badge = document.getElementById('badge');
      badge.textContent = 'LVL ' + li.level;
      badge.style.color = c; badge.style.borderColor = c;
      document.getElementById('name').textContent = p.display_name || p.username || 'streamer';
      const fill = document.getElementById('fill');
      fill.style.width = li.pct + '%'; fill.style.background = c;
      document.getElementById('cur').textContent = (p.total_earned || 0) + ' pts earned';
      document.getElementById('next').textContent = li.toNext > 0 ? li.toNext + ' to LVL ' + (li.level + 1) : 'Top tier';
      card.classList.add('show');
    }catch(e){ /* keep last state */ }
  }

  tick();
  setInterval(tick, 15000);
</script>
</body>
</html>
